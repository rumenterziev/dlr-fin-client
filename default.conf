server {
    listen       ${PORT} default_server;
    server_name  _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    client_max_body_size 25m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https://lh3.googleusercontent.com https://storage.googleapis.com;
        connect-src 'self' https://yourdomain.com https://accounts.google.com;
        frame-src https://accounts.google.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;
    add_header X-Hosting-Country "BG" always;

    # Health check for Cloud Run
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Block hidden files
    location ~ /\. {
        access_log off;
        deny all;
        return 403;
    }

    # Block risky file types
    location ~* \.(env|yml|yaml|lock|sh|sql|log)$ {
        access_log off;
        deny all;
        return 403;
    }

    # Block common scanner paths
    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|wp-json|wordpress|phpmyadmin|\.git) {
        access_log off;
        return 404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
    }

    location = /site.webmanifest {
        try_files $uri =404;
        access_log off;
        default_type application/manifest+json;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass ${API_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
        proxy_pass_request_headers on;
        proxy_cookie_path / /;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|avif|woff2?)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache SPA shell
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;
}